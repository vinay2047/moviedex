name: Nightly NeuMF Retrain

on:
  schedule:
    # Every night at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

permissions:
  contents: read

jobs:
  retrain:
    name: Incremental NeuMF Retrain
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            torch==2.7.0 --index-url https://download.pytorch.org/whl/cpu \
            onnxruntime==1.22.0 \
            pandas==2.2.3 \
            numpy==2.2.6 \
            supabase==2.15.2 \
            huggingface_hub

      # ── 4. Run retrain ─────────────────────────────────────────────────
      - name: Run incremental retrain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend/scripts/retrain.py
